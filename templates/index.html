<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Triagem de GIFs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="resultado-page">

    <main class="resultado-container fade-up">

        <header class="hero">
            <p class="hero-badge">Sistema Inteligente</p>
            <h1>Triagem de GIFs</h1>
            <p>Total de referências cadastradas: <strong>{{ total_referencias }}</strong></p>
        </header>

        <!-- CADASTRAR -->
        <section class="glass-card">
            <h2>📥 Cadastrar GIF</h2>

            <form action="/cadastrar" method="post" enctype="multipart/form-data" class="form-grid">

                <input type="text" name="nome" placeholder="Nome da referência" required>

                <input type="file" name="gif" required>

                <button type="submit" class="btn-principal">Cadastrar</button>

            </form>
        </section>

        <!-- ANALISAR -->
        <section class="glass-card">
            <h2>🔍 Analisar GIF</h2>

            <form action="/analisar" method="post" enctype="multipart/form-data" class="form-grid">

                <input type="file" name="gif" required>

                <button type="submit" class="btn-principal">Analisar</button>

            </form>
        </section>

        <!-- RESET -->
        <section class="glass-card">
            <h2>⚠️ Resetar Base</h2>
            <p>Use com cuidado. Isso apagará todos os dados.</p>

            <form action="/resetar" method="post">
                <button type="submit" class="btn-danger">Resetar Base</button>
            </form>
        </section>

    </main>

</body>
</html>
